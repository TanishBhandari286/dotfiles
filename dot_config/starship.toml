# ~/.config/starship.toml

# Detached solid-color powerline format
format = """
$os\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$kubernetes\
\n$character"""
# Ros√© Pine Palette
palette = 'rose_pine'

[palettes.rose_pine]
base = '#191724'
overlay = '#26233a'
text = '#e0def4'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ebbcba'
pine = '#31748f'
foam = '#9ccfd8'
iris = '#c4a7e7'

[os]
disabled = false
format = "[ ÔÖĻ ](bg:pine fg:base)[Óāį](fg:pine) "

[hostname]
ssh_only = true
format = "[ ůįíč $hostname ](bg:love fg:base)[Óāį](fg:love) "

[directory]
format = "[ ÔĀľ $path ](bg:overlay fg:text)[Óāį](fg:overlay) "
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[ Ôźė $branch ](bg:rose fg:base)[Óāį](fg:rose) "

[git_status]
format = "[$all_status$ahead_behind ](fg:love)"

[nodejs]
format = "[ Óúė $version ](bg:gold fg:base)[Óāį](fg:gold) "

[kubernetes]
disabled = false
format = "[ ůĪÉĺ $context ](bg:foam fg:base)[Óāį](fg:foam) "

[character]
success_symbol = "[‚ĚĮ](bold pine)"
error_symbol = "[‚ĚĮ](bold love)"
vimcmd_symbol = "[‚Ěģ](bold gold)"
