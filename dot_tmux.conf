# ~/.tmux.conf

# --- 1. General Settings ---
# Enable true color support for Ghostty and Neovim
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# Set prefix to Ctrl+a (much easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix
# --- Pane Splitting ---
# Use | and - to split panes natively, and open in the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Optional: Unbind the old default keys so you don't hit them by accident
unbind '"'
unbind %
# Start windows and panes at 1, not 0 (matches AeroSpace/Hyprland)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
# Auto-rename the default session from '0' to '1'
set-hook -g session-created 'if-shell -F "#{==:#{session_name},0}" "rename-session 1"'
# --- 2. Vim Keybindings ---
# Act like Vim for pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- 3. Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Official Rosé Pine Theme
set -g @plugin 'rose-pine/tmux'
# The ultimate session manager
set -g @plugin 'omerxx/tmux-sessionx'
# --- Sessionx Configuration ---
# Bind it to 'o' (for open) instead of the default 'O'
set -g @sessionx-bind 'o'
# Set the popup window size to look clean and proportional
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
# Optional: enable zoxide integration so you can create sessions from anywhere
set -g @sessionx-zoxide-mode 'on'

# --- 4. Rosé Pine Theme Config ---
set -g @rose_pine_variant 'main' # Options are 'main', 'moon' or 'dawn'

# Clean up the status bar to keep it elegant and minimal
set -g @rose_pine_host 'on'
set -g @rose_pine_user 'on'
set -g @rose_pine_directory 'on'
set -g @rose_pine_bar_bg_disable 'on' 
set -g @rose_pine_bar_bg_disabled_color_option 'default'

# Custom separators for a modern look
set -g @rose_pine_left_separator ' > '
set -g @rose_pine_right_separator ' < '
set -g @rose_pine_field_separator ' | '
set -g @rose_pine_window_separator ' - '

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


# --- TPM Bootstrap ---
# Automatically install TPM if it's missing
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
